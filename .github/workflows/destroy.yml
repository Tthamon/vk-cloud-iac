# .github/workflows/destroy.yml
name: Destroy Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: iac-destroy
    env:
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
      OS_AUTH_URL: "https://msk.cloud.vk.com/infra/identity/v3/"
      OS_USER_DOMAIN_NAME: "users"
      OS_REGION_NAME: "RegionOne"
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_my_ip: ${{ secrets.MY_IP }}
      TF_VAR_bucket_name: ${{ secrets.BUCKET_NAME }}
      TF_VAR_s3_access_key: ${{ secrets.S3_ACCESS_KEY }}
      TF_VAR_s3_secret_key: ${{ secrets.S3_SECRET_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Install tools
        run: pip install awscli python-openstackclient

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/vk-cloud-key.pub
          chmod 600 ~/.ssh/vk-cloud-key.pub

      - name: Шаг 1 — Получение state из S3
        run: |
          cd terraform
          terraform init \
            -reconfigure \
            -backend-config="bucket=$BUCKET_NAME" \
            -backend-config="access_key=$S3_ACCESS_KEY" \
            -backend-config="secret_key=$S3_SECRET_KEY" \
            -input=false
          terraform state pull > local.tfstate
          echo "State получен из S3"

      - name: Шаг 2 — Переключение на local backend
        run: |
          cd terraform
          mv backend.tf backend.tf.bak
          cat > backend.tf << 'EOF'
          terraform {
            backend "local" {
              path = "./local.tfstate"
            }
          }
          EOF
          terraform init -reconfigure -input=false
          echo "Переключено на local backend"

      - name: Шаг 3 — Очистка S3 бакета
        run: |
          AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY \
          AWS_SECRET_ACCESS_KEY=$S3_SECRET_KEY \
          aws s3 rm s3://$BUCKET_NAME --recursive \
            --endpoint-url https://hb.ru-msk.vkcloud-storage.ru
          echo "Бакет очищен"

      - name: Шаг 4 — Удаление инфраструктуры
        run: |
          cd terraform
          terraform destroy -auto-approve
          echo "Инфраструктура удалена"

      - name: Шаг 5 — Удаление образа Packer
        run: |
          IMAGE_NAME=$(cat packer/image_name.txt 2>/dev/null || echo "")
          if [ -n "$IMAGE_NAME" ]; then
            IMAGE_ID=$(openstack image list \
              --name "$IMAGE_NAME" \
              --format value -c ID)
            if [ -n "$IMAGE_ID" ]; then
              openstack image delete "$IMAGE_ID"
              echo "Образ $IMAGE_NAME удалён"
            fi
          fi

      - name: Шаг 6 — Восстановление backend.tf
        if: always()
        run: |
          cd terraform
          rm -f backend.tf
          mv backend.tf.bak backend.tf
          echo "backend.tf восстановлен"